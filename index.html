        <i id="toast-icon" class="ph ph-info text-xl"></i>

    <script>
        // --- Configuration & State ---
        const MAX_FILES = 20;
        let filesQueue = [];
        let isProcessing = false;
        
        // --- DOM Elements ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const selectBtn = document.getElementById('select-btn'); 
        const fileListContainer = document.getElementById('file-list-container');
        const fileList = document.getElementById('file-list');
        const qualityInput = document.getElementById('quality');
        const qualityValue = document.getElementById('quality-value');
        const formatSelect = document.getElementById('output-format');
        const maxWidthSelect = document.getElementById('max-width');
        const downloadAllBtn = document.getElementById('download-all-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statsPanel = document.getElementById('stats-panel');
        const totalSavedEl = document.getElementById('total-saved');
        const progressCountEl = document.getElementById('progress-count');

        // --- Event Listeners ---
        
        // Quality Slider
        qualityInput.addEventListener('input', (e) => {
            qualityValue.textContent = `${e.target.value}%`;
        });

        // Image Selection Logic
        function triggerFileSelect(e) {
            e.stopPropagation(); 
            fileInput.click();
        }

        dropZone.addEventListener('click', triggerFileSelect);
        selectBtn.addEventListener('click', triggerFileSelect);
        fileInput.addEventListener('change', handleFiles);

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add('drop-active');
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('drop-active');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('drop-active');
            handleFiles(e);
        });

        downloadAllBtn.addEventListener('click', downloadAllAsZip);
        resetBtn.addEventListener('click', resetAll);

        // --- Core Functions ---

        function handleFiles(e) {
            let files = [];
            if (e.type === 'drop') {
                files = Array.from(e.dataTransfer.files);
            } else {
                files = Array.from(e.target.files);
            }

            const imageFiles = files.filter(file => file.type.startsWith('image/'));
            
            if (imageFiles.length === 0) {
                if (files.length > 0) showToast('请上传有效的图片文件', 'error');
                return;
            }

            if (filesQueue.length + imageFiles.length > MAX_FILES) {
                showToast(`一次最多只能处理 ${MAX_FILES} 张图片`, 'warning');
                const remainingSlots = MAX_FILES - filesQueue.length;
                if (remainingSlots <= 0) return;
                files = imageFiles.slice(0, remainingSlots);
            } else {
                files = imageFiles;
            }

            fileListContainer.classList.remove('hidden');
            statsPanel.classList.remove('hidden');
            resetBtn.classList.remove('hidden');

            files.forEach(file => {
                const id = Math.random().toString(36).substr(2, 9);
                const fileObj = {
                    id: id,
                    original: file,
                    compressedBlob: null,
                    finalMimeType: '', 
                    status: 'pending', 
                    originalSize: file.size
                };
                filesQueue.push(fileObj);
                renderFileCard(fileObj);
                processImage(fileObj);
            });
            
            fileInput.value = '';
            updateStats();
        }

        function resetAll() {
            filesQueue = [];
            fileList.innerHTML = '';
            fileListContainer.classList.add('hidden');
            statsPanel.classList.add('hidden');
            resetBtn.classList.add('hidden');
            downloadAllBtn.classList.add('hidden');
            totalSavedEl.textContent = '0 MB';
            progressCountEl.textContent = '0 / 0';
            fileInput.value = '';
            showToast('已重置所有内容', 'success');
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function getExtensionFromMime(mimeType) {
            switch(mimeType) {
                case 'image/jpeg': return 'jpg';
                case 'image/png': return 'png';
                case 'image/webp': return 'webp';
                case 'image/avif': return 'avif';
                case 'image/bmp': return 'bmp';
                default: return 'jpg';
            }
        }

        function renderFileCard(fileObj) {
            const card = document.createElement('div');
            card.id = `card-${fileObj.id}`;
            card.className = 'file-card bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4 relative overflow-hidden';
            
            const url = URL.createObjectURL(fileObj.original);
            
            card.innerHTML = `
                <div class="w-16 h-16 bg-slate-100 rounded-lg overflow-hidden flex-shrink-0 border border-slate-200 shadow-inner">
                    <img src="${url}" class="w-full h-full object-cover" alt="${fileObj.original.name} preview">
                </div>
                <div class="flex-1 min-w-0 z-10">
                    <div class="flex justify-between items-start">
                        <h4 class="font-medium text-slate-800 truncate pr-2" title="${fileObj.original.name}">${fileObj.original.name}</h4>
                        <button onclick="removeFile('${fileObj.id}')" class="text-slate-400 hover:text-red-500 transition-colors p-1" aria-label="移除文件">
                            <i class="ph ph-x"></i>
                        </button>
                    </div>
                    <div class="text-xs text-slate-500 mt-1 flex items-center gap-2 flex-wrap">
                        <span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600 border border-slate-200">${formatSize(fileObj.originalSize)}</span>
                        <i class="ph ph-arrow-right text-slate-300"></i>
                        <span id="size-${fileObj.id}" class="font-bold text-slate-800">处理中...</span>
                        <span id="badge-${fileObj.id}" class="hidden ml-2 px-2 py-0.5 rounded text-[10px] font-bold"></span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-1.5 mt-3 overflow-hidden">
                        <div id="bar-${fileObj.id}" class="bg-sky-500 h-1.5 rounded-full w-0 transition-all duration-500"></div>
                    </div>
                </div>
                <div id="action-${fileObj.id}" class="hidden ml-2 z-10">
                    <a id="link-${fileObj.id}" href="#" download title="下载此图片" class="w-9 h-9 rounded-lg bg-slate-50 text-slate-600 border border-slate-200 hover:bg-sky-50 hover:text-sky-600 hover:border-sky-200 flex items-center justify-center transition-all">
                        <i class="ph ph-download-simple text-lg"></i>
                    </a>
                </div>
            `;
            fileList.appendChild(card);
        }

        async function processImage(fileObj) {
            const qualityVal = parseInt(qualityInput.value); // 0-100
            const quality = qualityVal / 100; // 0.0 - 1.0 (for lossy formats)
            let outputFormat = formatSelect.value;
            const maxWidth = parseInt(maxWidthSelect.value);

            if (outputFormat === 'original') {
                outputFormat = fileObj.original.type;
                if (!outputFormat) outputFormat = 'image/jpeg';
            }

            const progressBar = document.getElementById(`bar-${fileObj.id}`);
            const sizeLabel = document.getElementById(`size-${fileObj.id}`);
            const badge = document.getElementById(`badge-${fileObj.id}`);
            const actionDiv = document.getElementById(`action-${fileObj.id}`);
            const downloadLink = document.getElementById(`link-${fileObj.id}`);

            progressBar.style.width = '30%';

            try {
                const img = new Image();
                img.src = URL.createObjectURL(fileObj.original);
                
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                });

                progressBar.style.width = '60%';

                const originalWidth = img.naturalWidth;
                const originalHeight = img.naturalHeight;
                let width = originalWidth;
                let height = originalHeight;

                let isResized = false;
                if (maxWidth > 0 && width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                    isResized = true;
                }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                // For JPEG, we need white background.
                // For PNG, we need transparency.
                if (outputFormat === 'image/jpeg') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, width, height);
                }
                
                ctx.drawImage(img, 0, 0, width, height);

                // --- COMPRESSION LOGIC START ---

                const finishProcessing = (blob) => {
                     // Check if result is larger (Negative compression)
                    let finalBlob = blob;
                    let isReverted = false;
                    const isSameFormat = (fileObj.original.type === blob.type);
                    
                    // Logic: If result > original AND same format AND no resize, keep original.
                    if (blob.size > fileObj.originalSize && isSameFormat && !isResized) {
                        finalBlob = fileObj.original;
                        isReverted = true;
                    }

                    progressBar.style.width = '100%';
                    progressBar.classList.replace('bg-sky-500', 'bg-emerald-500');

                    fileObj.compressedBlob = finalBlob;
                    fileObj.finalMimeType = finalBlob.type;
                    fileObj.status = 'done';

                    const reduction = ((fileObj.originalSize - finalBlob.size) / fileObj.originalSize * 100).toFixed(0);
                    const isLarger = finalBlob.size > fileObj.originalSize;

                    sizeLabel.innerHTML = formatSize(finalBlob.size);
                    
                    if (isReverted) {
                        badge.textContent = `无法压缩`;
                        badge.className = 'ml-2 px-2 py-0.5 rounded text-[10px] font-bold bg-slate-100 text-slate-500 inline-block border border-slate-200';
                        badge.title = "原图已经很小，浏览器处理后体积未减小，已保留原图";
                    } else if (!isLarger) {
                        badge.textContent = `-${reduction}%`;
                        badge.className = 'ml-2 px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-50 text-emerald-600 border border-emerald-200 inline-block';
                    } else {
                         badge.textContent = `变大`;
                         badge.className = 'ml-2 px-2 py-0.5 rounded text-[10px] font-bold bg-orange-50 text-orange-600 border border-orange-200 inline-block';
                    }

                    const ext = getExtensionFromMime(finalBlob.type);
                    const newName = fileObj.original.name.substring(0, fileObj.original.name.lastIndexOf('.')) + '_min.' + ext;
                    
                    downloadLink.href = URL.createObjectURL(finalBlob);
                    downloadLink.download = newName;
                    
                    actionDiv.classList.remove('hidden');
                    updateStats();
                };

                // --- 1. Handle PNG with UPNG.js (TinyPNG Style) ---
                if (outputFormat === 'image/png') {
                    // Get raw pixel data
                    const d = ctx.getImageData(0, 0, width, height).data;
                    
                    // UPNG.encode expects ArrayBuffer of RGBA
                    let cnum = Math.floor(qualityVal * 2.56); 
                    if (cnum < 16) cnum = 16;
                    if (cnum > 256) cnum = 256;

                    setTimeout(() => {
                        try {
                            const pngBuffer = UPNG.encode([d.buffer], width, height, cnum);
                            const pngBlob = new Blob([pngBuffer], {type: 'image/png'});
                            finishProcessing(pngBlob);
                        } catch (e) {
                            console.error("UPNG Error:", e);
                            handleError(fileObj.id, "压缩出错");
                        }
                    }, 50);
                } 
                // --- 2. Handle JPG/WebP/Standard Canvas ---
                else {
                    canvas.toBlob((blob) => {
                        if (!blob) {
                            handleError(fileObj.id, "Compression Failed");
                            return;
                        }
                        finishProcessing(blob);
                    }, outputFormat, quality);
                }

            } catch (err) {
                console.error(err);
                handleError(fileObj.id, "格式错误");
            }
        }

        function handleError(id, msg) {
            const progressBar = document.getElementById(`bar-${id}`);
            const sizeLabel = document.getElementById(`size-${id}`);
            progressBar.classList.replace('bg-sky-500', 'bg-red-500');
            progressBar.style.width = '100%';
            sizeLabel.textContent = msg;
            sizeLabel.classList.add('text-red-500');
            const file = filesQueue.find(f => f.id === id);
            if(file) file.status = 'error';
            updateStats();
        }

        function removeFile(id) {
            const index = filesQueue.findIndex(f => f.id === id);
            if (index > -1) {
                filesQueue.splice(index, 1);
                document.getElementById(`card-${id}`).remove();
                if (filesQueue.length === 0) {
                    resetAll();
                } else {
                   updateStats();
                }
            }
        }

        function updateStats() {
            const doneFiles = filesQueue.filter(f => f.status === 'done');
            if (doneFiles.length > 0) {
                downloadAllBtn.classList.remove('hidden');
                downloadAllBtn.disabled = false;
                resetBtn.classList.remove('hidden');
            } else if (filesQueue.length > 0) {
                resetBtn.classList.remove('hidden');
                downloadAllBtn.classList.add('hidden');
            } else {
                downloadAllBtn.classList.add('hidden');
                resetBtn.classList.add('hidden');
            }

            let totalOrig = 0;
            let totalComp = 0;
            doneFiles.forEach(f => {
                totalOrig += f.originalSize;
                totalComp += f.compressedBlob.size;
            });
            const saved = Math.max(0, totalOrig - totalComp);
            totalSavedEl.textContent = formatSize(saved);
            progressCountEl.textContent = `${doneFiles.length} / ${filesQueue.length}`;
        }

        async function downloadAllAsZip() {
            const doneFiles = filesQueue.filter(f => f.status === 'done');
            if (doneFiles.length === 0) return;

            const btnOriginalText = downloadAllBtn.innerHTML;
            downloadAllBtn.disabled = true;
            downloadAllBtn.innerHTML = `<i class="ph ph-spinner animate-spin"></i> 打包中...`;

            try {
                const zip = new JSZip();
                const folder = zip.folder("compressed_images");
                doneFiles.forEach(f => {
                    const ext = getExtensionFromMime(f.finalMimeType);
                    let fileName = f.original.name;
                    fileName = fileName.substring(0, fileName.lastIndexOf('.'));
                    fileName = `${fileName}_min.${ext}`;
                    folder.file(fileName, f.compressedBlob);
                });
                const content = await zip.generateAsync({type:"blob"});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "images_compressed.zip";
                link.click();
                showToast('打包下载已开始', 'success');
            } catch (e) {
                showToast('打包失败', 'error');
                console.error(e);
            } finally {
                downloadAllBtn.disabled = false;
                downloadAllBtn.innerHTML = btnOriginalText;
            }
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const message = document.getElementById('toast-message');
            message.textContent = msg;
            toast.className = `fixed bottom-5 right-5 px-4 py-3 rounded-lg shadow-lg transform transition-all duration-300 z-50 flex items-center gap-3 text-white`;
            if (type === 'error') {
                toast.classList.add('bg-red-600', 'translate-y-0', 'opacity-100');
                icon.className = 'ph ph-warning-circle text-xl';
            } else if (type === 'success') {
                toast.classList.add('bg-emerald-600', 'translate-y-0', 'opacity-100');
                icon.className = 'ph ph-check-circle text-xl';
            } else {
                toast.classList.add('bg-slate-800', 'translate-y-0', 'opacity-100');
                icon.className = 'ph ph-info text-xl';
            }
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
